<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>AI Currency Converter — Powered by Gemini</title>
    <meta name="description" content="An AI-powered currency converter chatbot using Google Gemini 2.0 Flash and live exchange rates. Ask naturally and get instant results.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">

        <!-- ===== LEFT: CHAT PANEL ===== -->
        <div class="left-panel">
            <div class="chat-container">

                <div class="chat-header">
                    <div class="chat-header-icon">💱</div>
                    <div class="chat-header-text">
                        <div class="chat-header-title">AI Currency Converter</div>
                        <div class="chat-header-subtitle">Powered by Gemini 2.0 Flash · Live Exchange Rates</div>
                    </div>
                    <div class="status-dot" title="AI Online"></div>
                </div>

                <div class="chat-window" id="chat-window"></div>

                <div class="chat-loading-container">
                    <div class="loading-indicator loading-dots" id="chat-loading">Thinking</div>
                </div>

                <div class="input-area">
                    <input
                        type="text"
                        id="user-input"
                        placeholder="e.g., &quot;Convert 500 USD to INR&quot; or ask anything…"
                        autocomplete="off"
                        spellcheck="false"
                    >
                    <button id="send-button" title="Send message">Send ✦</button>
                    <button id="clear-chat-button" title="Clear chat">Clear</button>
                </div>

            </div>
        </div>

        <!-- ===== RIGHT: INFO PANEL ===== -->
        <div class="right-panel">

            <div class="info-section" id="result-display">
                <h3><span class="section-icon">✦</span> Latest Result</h3>
                <p id="result-content">N/A</p>
            </div>

            <div class="info-section" id="formula-display">
                <h3><span class="section-icon">∫</span> Formula Used</h3>
                <p id="formula-content">N/A</p>
            </div>

            <div class="info-section" id="rate-display">
                <h3><span class="section-icon">⟳</span> Current Rate</h3>
                <p id="rate-content">N/A</p>
            </div>

            <div class="quick-converter-container">
                <button id="toggle-converter-button" title="Toggle Quick Check Tool">
                    ⚡ Show Quick Converter
                </button>
                <div class="quick-converter" id="quick-converter-section">
                    <h2>⚡ Quick Converter</h2>
                    <div class="converter-form">
                        <div>
                            <label for="amount-input">Amount</label>
                            <input type="number" id="amount-input" placeholder="1.00" min="0" step="any" value="1">
                        </div>
                        <div>
                            <label for="from-currency">From</label>
                            <select id="from-currency"></select>
                        </div>
                        <div>
                            <label for="to-currency">To</label>
                            <select id="to-currency"></select>
                        </div>
                        <div class="loading-indicator" id="converter-loading">Fetching rates…</div>
                        <div id="converter-error"></div>
                        <button id="convert-button">Convert Now →</button>
                        <div id="conversion-result">Result will appear here</div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js?v=4" defer></script>
</body>
</html>
